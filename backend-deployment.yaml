# backend-deployment.yaml

# 1. IAM Roleкіј м—°кІ°н•  ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: default
  annotations:
    # Terraform `iam.tf`м—җ м •мқҳлҗң IAM Roleмқҳ ARNмқ„ м—¬кё°м—җ мһ…л Ҙн•ҙм•ј н•©лӢҲлӢӨ.
    eks.amazonaws.com/role-arn: "arn:aws:iam::016562553479:role/community-backend-app-role"

---
# 2. AWS Secrets ManagerмҷҖ м—°лҸҷн•ҳкё° мң„н•ң SecretProviderClass
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: community-db-creds-provider
  namespace: default
spec:
  provider: aws
  parameters:
    # Terraform `rds.tf`м—җм„ң мғқм„ұн•ң Secrets Manager Secretмқҳ мқҙлҰ„мқ„ м§Җм •н•©лӢҲлӢӨ.
    objectName: "community-db-credentials"
    objectType: "secretsmanager"
  # мқҙ SecretProviderClassлҘј нҶөн•ҙ мғқм„ұлҗ  Kubernetes Secretмқҳ мқҙлҰ„
  secretObjects:
    - secretName: backend-db-secrets
      type: Opaque
      data:
        # Secrets Managerм—җ мһҲлҠ” JSON нӮӨлҘј Kubernetes Secretмқҳ нӮӨлЎң л§Өн•‘н•©лӢҲлӢӨ.
        - objectName: "DB_HOST"
          key: DB_HOST
        - objectName: "DB_PORT"
          key: DB_PORT
        - objectName: "DB_USER"
          key: DB_USER
        - objectName: "DB_PASSWORD"
          key: DB_PASSWORD
        - objectName: "DB_NAME"
          key: DB_NAME

---
# 3. мҲҳм •лҗң Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment # GitHub Actionsм—җм„ң мӮ¬мҡ©н•ң мқҙлҰ„кіј мқјм№ҳн•ҙм•ј н•©лӢҲлӢӨ.
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # 1лІҲм—җм„ң л§Ңл“  ServiceAccountлҘј мӮ¬мҡ©н•ҳлҸ„лЎқ м§Җм •
      serviceAccountName: backend-sa
      containers:
        - name: backend-container
          # л°ұм—”л“ң ECR мқҙлҜём§Җ мЈјмҶҢлҘј м—¬кё°м—җ мһ…л Ҙн•ҳм„ёмҡ”.
          image: "016562553479.dkr.ecr.ap-southeast-2.amazonaws.com/community-be:latest" # `${ACCOUNT_ID}`мҷҖ лҰ¬м „мқ„ нҷ•мқён•ҳм„ёмҡ”.
          ports:
            - containerPort: 8000
          # Secrets Store CSI Driverк°Җ л§Ңл“  Kubernetes Secretмқ„ нҷҳкІҪліҖмҲҳлЎң мЈјмһ…
          envFrom:
            - secretRef:
                name: backend-db-secrets
          volumeMounts:
            - name: secrets-store-inline
              mountPath: "/mnt/secrets-store"
              readOnly: true
      # CSI ліјлҘЁ м •мқҳ
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              # 2лІҲм—җм„ң л§Ңл“  SecretProviderClassмқҳ мқҙлҰ„мқ„ м§Җм •
              secretProviderClass: "community-db-creds-provider"
