name: Backend Deploy to ECR

on:
  push:
    branches: [ main ] # 메인 브랜치에 푸시될 때 실행

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
            aws-access-key-id: ${{ secrets.AWS_ID }}
            aws-secret-access-key: ${{ secrets.AWS_KEY }}
            aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Images
        run: |
          # ECR 리포지토리 이름(community-be)이 AWS 콘솔과 똑같아야 합니다.
          docker build -t ${{ steps.login-ecr.outputs.registry }}/community-be:latest .
          docker push ${{ steps.login-ecr.outputs.registry }}/community-be:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name community-eks-cluster --region ${{ secrets.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          kubectl rollout restart deployment backend-deployment